version: "3.9"

services:

  frontend:
    build: ./frontend
    restart: 'always'
    container_name: cloud-frontend
    # Only public-facing service. nginx terminates TLS with the Cloudflare origin cert.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    networks:
      app-sso-network:
        ipv4_address: 172.27.0.11
    depends_on:
      - backend

  backend:
    build: ./server
    restart: 'always'
    container_name: cloud-backend
    # Internal only — reached via http://cloud-backend:3000 from nginx. Not published.
    networks:
      app-sso-network:
        ipv4_address: 172.27.0.12
    depends_on:
      - mongodb
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - CLIENT_URL=${CLIENT_URL}

  mongodb:
    image: mongo:8.0
    restart: 'always'
    container_name: cloud-mongodb
    # Internal only — not published to the host.
    command: ["--port", "27018"]
    networks:
      app-sso-network:
        ipv4_address: 172.27.0.13
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

networks:
  app-sso-network:
    name: app-sso-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.0.0/16