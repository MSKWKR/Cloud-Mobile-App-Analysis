# Edge nginx: TLS termination (Cloudflare origin cert) + SPA static + API reverse proxy

# Redirect plain HTTP to HTTPS (Cloudflare connects on 443, this is a safety net)
server {
    listen 80;
    server_name cmaa.solitesterror.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name cmaa.solitesterror.com;

    # Cloudflare Origin Certificate (15-year). See certs/ in repo root.
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # Match Cloudflare free-plan body cap; covers .ipa/.apk uploads
    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html;

    # Backend API + upload/analysis endpoints -> Express backend (internal HTTP)
    location ~ ^/(api|upload|uploads|guest|check-hash|ios-static-analyze|android-static-analyze|android-dynamic-analyze|generate-report|retry)(/|$) {
        proxy_pass http://cloud-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        # Long-running PDF generation / report endpoints
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
