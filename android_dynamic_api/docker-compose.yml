version: "3.9"

services:

  frontend:
    build: ./local-frontend
    restart: 'always'
    container_name: local-frontend
    ports:
      - "5173:5173"
    networks:
      app-sso-network:
        ipv4_address: 172.27.0.11
    depends_on:
      - backend

  backend:
    build: ./server
    restart: 'always'
    container_name: local-backend
    networks:
      app-sso-network:
        ipv4_address: 172.27.0.12
    ports:
      - "3000:3000"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7.0
    restart: 'always'
    container_name: local-mongodb
    ports:
      - "27018:27018"
    command: ["--port", "27018"]
    networks:
      app-sso-network:
        ipv4_address: 172.27.0.13
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

networks:
  app-sso-network:
    name: app-sso-network
    external: true